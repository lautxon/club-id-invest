# GitHub Actions Workflow para actualizar Prebuilds de Codespaces
# Se ejecuta automáticamente cuando hay cambios en:
# - .devcontainer/**
# - docker-compose.yml
# - requirements.txt
# - frontend/package.json

name: Update Codespaces Prebuild

on:
  push:
    branches:
      - main
    paths:
      - '.devcontainer/**'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  
  # También se puede ejecutar manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  update-prebuild:
    name: Update Codespaces Prebuild
    runs-on: ubuntu-latest
    permissions:
      contents: read
      codespaces: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate prebuild artifact
        run: |
          echo "Prebuild triggered for Codespaces"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          
      - name: Notify prebuild update
        run: |
          echo "✅ Codespaces prebuild configuration updated"
          echo "   Los nuevos Codespaces usarán esta configuración pre-construida"
          echo "   Tiempo estimado de apertura: 30-60 segundos"
